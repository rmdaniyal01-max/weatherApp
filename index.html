<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weather App</title>
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0px;
                padding: 10px;
                background: linear-gradient(135deg,#4facfe,#00f2fe);
                transition: background-color 0.8s ease;
            }
            #weatherCard{
                display: flex;
                flex-direction: column;
                width: 350px;
                background: linear-gradient(to top,#4facfe,#00f2fe);
                border:2px solid #4facfe;
                backdrop-filter: blur(15px);
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 15px 40px rgba(0,0,0,.2);
                text-align: center;
                animation: fadeIn 1s ease ;
                transition: 
                    transform .3s ease,
                    background-color .3s ease;
            }
            #weatherCard:hover{
                transform: translateY(-5px);
            }
            .search-box{
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            #cityInput{
                flex: 1;
                padding: 12px;
                border: none;
                outline: none;
                border-radius: 5px;
            }
            #searchButton{
                display: inline;
                background: blue;
                color: white;
                border: none;
                border-radius: 10px;
                padding: 12px 20px;
                cursor: pointer;
                transition: .3s;
            }
            #searchButton:active{
                transform: scale(.98);
            }
            #locationButton{
                display: inline;
                background: blue;
                color: white;
                border: none;
                border-radius: 10px;
                padding: 12px 20px;
                cursor: pointer;
                transition: .3s;
            }
            #locationButton:active{
                transform: scale(.98);
            }

            .weather-icon{
                font-size: 80px;
                margin-bottom: 15px;
                animation: float 2s ease-in-out infinite alternate;
            }
            @keyframes float{
                from{
                    transform: translateY(10px);
                }
                to{
                    transform: translateY(0);
                }
            }
            #weather{
                animation: fadeIn 1s ease ;
            }
            #weather p{
                animation: fadeIn 1s ease ;
            }
            #weather h2{
                display: inline;
                font-size: 3rem;
                margin: 20px 0 10px;
                color: #222;
                animation: fadeIn 1s ease ;
            }
            #weather h5{
                display: inline;
                color: rgba(255,255,255,.8);
                margin-top: 10px
            }
            
            .weather-details{
                display: grid;
                grid-template-columns: repeat(2,1fr);
                gap: 15px;
                margin-top: 20px;
            }
            .detail-card{
                border:1px dashed #00f2fe;
                background: rgba(255,255,255,.15);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 15px;
                transition: .3s ease;
            }
            .detail-card:hover{
                transform: translateY(-5px);
            }

            .detail-card h3{
                margin-bottom: 10px;
            }

            .detail-card p{
                background-color: rgba(255, 255, 255, 0.192);
                color: rgba(255,255,255,.8);
                backdrop-filter: blur(10px);
                padding: 5px 10px;
                border-radius: 5px;
                font-size: 22px;
                font-weight: bold;
                margin: 20px 0px;
                animation: fadeIn 1s ease .5s backwards ;
            }
            .other-details{
                display: grid;
                grid-template-columns: repeat(2,1fr);
                background-color: rgba(255, 255, 255, 0.192);
                border:1px dashed #00f2fe;
                backdrop-filter: blur(10px);
                padding: 5px 10px;
                margin-top: 10px;
                border-radius: 10px;
                animation: fadeIn 1s ease .8s;
                transition: .3s ease;
            }
            .other-details:hover{
                transform: translateY(-5px);
            }

            .other-details p{
                color: rgba(255,255,255,.8);
                font-size: 15px;
            }

            #forecast{
                display: flex;
                gap: 10px;
                margin-top: 20px;
                overflow-x: auto;
                padding: 10px 5px;
            }
            #forecast::-webkit-scrollbar{
                display: none;
            }
            .forecast-card{
                min-width: 90px;
                padding: 12px;
                border-radius: 10px;
                background: rgba(255,255,255,.2);
                backdrop-filter: blur(10px);
                color: white;
                transition: .3s;
            }
            .forecast-card:hover{
                transform: translateY(-8px);
            }
            .forcast-icon{
                font-size: 35px;
                margin: 10px 0px;
            }
            .today{
                border: 2px solid white;
                transform: scale(1.02)
            }
            
            @keyframes fadeIn{
                from{
                    opacity: 0;
                    transform: translateY(15px);
                }
                to{
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
        </style>
    </head>

    <body>
        <div id="weatherCard">
            <div class="search-box">
                <h1>⛅ Weather App</h1>
                <input type="search" id="cityInput" placeholder="Enter City">
                <button id="searchButton">🔍 Search</button>
                <button id="locationButton">📍 Use my location</button>
                <div id="weather"></div>
                <div id="forecast"></div>
            </div>
        </div>
        <script src="weatherApp.js"></script>
    </body>
</html>
